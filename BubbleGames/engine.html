       /* UI Toolbar Container */
        #ui {
            position: absolute;

            left: 20px; /* Changed from 50% */

            background: rgba(255, 255, 255, 0.85);

            display: flex;
            gap: 10px;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        #ui.minimized {
            top: -100px;
        }

        /* Control Buttons */
        .btn {
            background: #ffffff;
            border: 2px solid #ccc;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .btn.active {
            background: #00a8ff;
            color: white;
            border-color: #0081c4;
        }

        #playBtn {
            background: #2ed573;
            color: white;
            border-color: #26af5f;
        }

        #playBtn:hover {
            background: #26af5f;
        }

        /* Block Counter */
        .counter {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-left: 10px;
        }

        #play-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            pointer-events: none;
            text-align: center;
            z-index: 100;
        }

            position: absolute;
            bottom: -150px;

            backdrop-filter: blur(5px);

            z-index: 101;

        #fill-dialog.visible {
            bottom: 0px;
        }

        #fill-dialog span {
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }

        .dialog-buttons {
            display: flex;
            gap: 12px;
        }

            background: #2ed573;

            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;

        #doneBtn:hover {

                    // Duck brain reads REAL block size 🦆
let halfX = 0.5;
let halfY = 0.5;
let halfZ = 0.5;

    halfZ = b.geometry.parameters.depth / 2;

    b.position.z - (b.userData.lastZ ?? b.position.z);

                        const footLevel = playerTarget.y - playerHeight;

                        if (velocityY > 0 && playerTarget.y >= b.position.y - halfY && playerTarget.y - velocityY <= b.position.y - (halfY - 0.15)) {

                });

                canJump = onGround;
                if (keys[' '] && canJump) { velocityY = robloxJumpPower; canJump = false; }

function runWorldCommand(line) {

    const p = line.split(" ");

    const cmd = p[0].toUpperCase();

   let obj = worldObjects[p[1]];

if (!obj) {

    blocks.forEach(block => {

        if (
            block.userData.name &&
            block.userData.name.toLowerCase() ===
            p[1].replace(/"/g,"").toLowerCase()
        ) {
            obj = block;
        }

    });

}

if (!obj) return;

    if (cmd === "MOVE") {

        const axis = p[2].toLowerCase();

        const value = parseFloat(p[3]);

        obj.position[axis] += value;
    }

    if (cmd === "ROTATE") {

        const color = p[2].toLowerCase();

        const deg = parseFloat(p[3]);

        const rad = deg * Math.PI / 180;

        if (color === "red") obj.rotation.x += rad;
        if (color === "green") obj.rotation.y += rad;
        if (color === "blue") obj.rotation.z += rad;
    }

    if (cmd === "SET") {

        for(let i=2;i<p.length;i++) {

            if (p[i] === "x" && p[i+1] === "=")
                obj.position.x = parseFloat(p[i+2]);

            if (p[i] === "y" && p[i+1] === "=")
                obj.position.y = parseFloat(p[i+2]);

            if (p[i] === "z" && p[i+1] === "=")
                obj.position.z = parseFloat(p[i+2]);
        }
    }
if (cmd === "WAIT") {

    // coming soon
}
}


function updateScripts() {

    const now = performance.now();

    runningTasks.forEach(task => {

        if (now < task.nextTime) return;

        const line = task.lines[task.index];

        const p = line.split(" ");

        if (p[0].toUpperCase() === "WAIT") {

           const match = line.match(/WAIT\s*\((.*?)\)/i);

if (match) {

    task.nextTime =
        now + parseFloat(match[1]) * 1000;

}
        }

        else {

            runWorldCommand(line);

            task.nextTime = now;
        }

        task.index++;

        if (task.index >= task.lines.length) {

            task.index = 0;
        }
    });
}
