<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | The Hub</title>
    <style>
        :root {
            --bg-color: #f0f4ff;
            --card-bg: white;
            --sidebar-bg: white;
            --text-main: #4f46e5;
            --text-sub: #333;
            --border-color: #e0e7ff;
            --shadow: rgba(79, 70, 229, 0.1);
            --juicy-gradient: linear-gradient(135deg, #4f46e5, #ec4899);
            --bubble-glow: rgba(236, 72, 153, 0.3);
        }

        .dark-theme {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --sidebar-bg: #1e293b;
            --text-main: #818cf8;
            --text-sub: #f1f5f9;
            --border-color: #334155;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* SIDEBAR */
        .sidebar {
            width: 90px;
            background: var(--sidebar-bg);
            border-right: 4px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            gap: 25px;
            z-index: 10;
        }

        .side-icon {
            width: 60px;
            height: 60px;
            background: #f3f4f6;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #666;
        }

        .side-icon.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .side-icon:hover:not(.active) { 
            transform: scale(1.15); 
            background: #ec4899; 
            color: white; 
        }

        /* MAIN CONTENT */
        .main-content {
            flex-grow: 1;
            padding: 50px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        h2 { color: var(--text-main); font-size: 32px; }

        .hero-search {
            width: 100%;
            max-width: 800px;
            padding: 25px 35px 25px 70px;
            font-size: 22px;
            border-radius: 40px;
            border: 5px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-sub);
            outline: none;
            transition: 0.3s;
        }

        /* GAME CARDS */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .market-card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 30px;
            border: 6px solid var(--border-color);
            text-align: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            color: var(--text-sub);
            position: relative;
        }

        .market-card:hover { transform: translateY(-10px); border-color: var(--text-main); box-shadow: 0 15px 30px var(--shadow); }
        .market-icon { font-size: 55px; display: block; margin-bottom: 10px; }

        /* JUICY NEW GAME BUTTON */
        .new-game-btn {
            background: var(--juicy-gradient);
            color: white;
            padding: 18px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            font-size: 20px;
            text-transform: uppercase;
            box-shadow: 0 8px 0 #3730a3, 0 15px 25px var(--bubble-glow);
            animation: float 3s ease-in-out infinite;
        }

        /* SLIDE PANEL - FIXED BUTTON POSITION */
        .slide-panel {
            position: fixed;
            bottom: -100%;
            left: 90px;
            right: 0;
            background: var(--card-bg);
            border-top: 8px solid var(--text-main);
            padding: 30px 40px;
            height: 400px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1);
            z-index: 100;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.2);
            color: var(--text-sub);
        }

        .slide-panel.open { bottom: 0; }

        .panel-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }

        .panel-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-desc {
            font-size: 18px;
            line-height: 1.5;
            margin: 15px 0;
            max-height: 120px;
            overflow-y: auto;
        }

        .play-btn {
            background: var(--juicy-gradient);
            color: white;
            padding: 20px 0;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px auto;
            border-radius: 60px;
            border: none;
            font-size: 28px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 0 #3730a3, 0 15px 30px rgba(236, 72, 153, 0.4);
            transition: 0.1s;
            text-transform: uppercase;
        }

        .play-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #3730a3; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div id="nav-home" class="side-icon active" onclick="switchTab('home')">🏠</div>
        <div id="nav-create" class="side-icon" onclick="switchTab('create')">🧱</div>
        <div id="nav-settings" class="side-icon" onclick="switchTab('settings')">⚙️</div>
    </div>

    <div id="view-home" class="main-content">
        <div style="text-align: center;">
            <h2 id="welcome-text">Discover Games</h2>
            <div style="position: relative; display: inline-block; width: 100%; max-width: 800px;">
                <span style="position: absolute; left: 25px; top: 22px; font-size: 30px;">🔍</span>
                <input type="text" class="hero-search" placeholder="Search all bubble games...">
            </div>
        </div>
        <div class="game-grid" id="global-game-grid"></div>
    </div>

    <div id="view-create" class="main-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Your Creations</h2>
            <button class="new-game-btn">+ New Game</button>
        </div>
        <div class="game-grid" id="owned-game-grid"></div>
    </div>

    <div id="view-settings" class="main-content" style="display: none;">
        <h2>Settings</h2>
        <button id="logoutBtn" style="padding: 10px 20px; cursor:pointer;">Log Out</button>
    </div>

    <!-- SLIDE PANEL -->
    <div id="actionPanel" class="slide-panel">
        <div class="panel-container">
            <div class="panel-info">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; gap: 20px; align-items: center;">
                        <span id="panelIcon" style="font-size: 50px;">🎮</span>
                        <h2 id="panelTitle" style="margin: 0;">Game Title</h2>
                    </div>
                    <button onclick="closePanel()" style="cursor:pointer; background:none; border:none; font-size:32px; color: var(--text-sub);">✕</button>
                </div>
                <p id="panelDesc" class="panel-desc">Description text...</p>
            </div>
            
            <!-- Play button stays at the bottom of the container -->
            <button class="play-btn">Play Now</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './static/supabase.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // Fixed Username Logic: Tries Username -> Full Name -> Email prefix
            const profileName = user.user_metadata.username || 
                                user.user_metadata.full_name || 
                                user.email.split('@')[0];

            document.getElementById('welcome-text').innerText = `Welcome, ${profileName}! ✨`;
            
            loadGames();
        });

        window.switchTab = (tabName) => {
            closePanel();
            ['view-home', 'view-create', 'view-settings'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById('view-' + tabName).style.display = 'flex';
        }

        window.openPanel = (name, icon, desc) => {
            document.getElementById('panelTitle').innerText = name;
            document.getElementById('panelIcon').innerText = icon;
            document.getElementById('panelDesc').innerText = desc;
            document.getElementById('actionPanel').classList.add('open');
        }

        window.closePanel = () => {
            document.getElementById('actionPanel').classList.remove('open');
        }

        function loadGames() {
            const globalGrid = document.getElementById('global-game-grid');
            const games = [
                { name: 'Lostination', icon: '👻', desc: 'A scary 3D survival experience where you explore the unknown!' },
                { name: 'Climb It!', icon: '🏔️', desc: 'Use physics to reach the top. It is harder than it looks!' },
                { name: 'Geometry Dash', icon: '🟦', desc: 'Jump and fly through danger in this rhythm-based platformer.' }
            ];

            globalGrid.innerHTML = games.map(g => `
                <div class="market-card" onclick="openPanel('${g.name}', '${g.icon}', '${g.desc}')">
                    <span class="market-icon">${g.icon}</span>
                    <h3>${g.name}</h3>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
