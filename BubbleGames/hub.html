<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | The Hub</title>
    <style>
        :root {
            --bg-color: #f0f4ff;
            --card-bg: white;
            --sidebar-bg: white;
            --text-main: #4f46e5;
            --text-sub: #333;
            --border-color: #e0e7ff;
            --shadow: rgba(79, 70, 229, 0.1);
            --juicy-gradient: linear-gradient(135deg, #4f46e5, #ec4899);
            --bubble-glow: rgba(236, 72, 153, 0.3);
        }

        .dark-theme {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --sidebar-bg: #1e293b;
            --text-main: #818cf8;
            --text-sub: #f1f5f9;
            --border-color: #334155;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* LOGO POSITIONED NEAR SIDEBAR */
        .logo-container {
            position: absolute;
            top: 20px;
            left: 110px; 
            width: 220px; /* ADJUSTED SIZE */
            z-index: 20;
            pointer-events: none;
        }

        .hub-logo {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 8px var(--shadow));
        }

        /* SIDEBAR */
        .sidebar {
            width: 90px;
            background: var(--sidebar-bg);
            border-right: 4px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px; 
            gap: 25px;
            z-index: 10;
        }

        .side-icon {
            width: 60px;
            height: 60px;
            background: #f3f4f6;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #666;
        }

        .side-icon.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .side-icon:hover:not(.active) { 
            transform: scale(1.15); 
            background: #ec4899; 
            color: white; 
        }

        /* MAIN CONTENT */
        .main-content {
            flex-grow: 1;
            padding: 50px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        h2 { color: var(--text-main); font-size: 32px; }

        .hero-search {
            width: 100%;
            max-width: 800px;
            padding: 25px 35px 25px 70px;
            font-size: 22px;
            border-radius: 40px;
            border: 5px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-sub);
            outline: none;
            transition: 0.3s;
        }

        .hero-search:focus { border-color: #4f46e5; transform: scale(1.01); }

        /* GAME CARDS */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .market-card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 30px;
            border: 6px solid var(--border-color);
            text-align: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            color: var(--text-sub);
            position: relative;
        }

        .market-card:hover { transform: translateY(-10px); border-color: var(--text-main); box-shadow: 0 15px 30px var(--shadow); }
        .market-icon { font-size: 55px; display: block; margin-bottom: 10px; }

        /* NO GAMES MESSAGE */
        .no-games {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-sub);
            opacity: 0.6;
            font-style: italic;
            padding: 40px;
        }

        /* JUICY NEW GAME BUTTON */
        .new-game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .new-game-btn {
            background: var(--juicy-gradient);
            color: white;
            padding: 18px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 0 #3730a3, 0 15px 25px var(--bubble-glow);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 3s ease-in-out infinite;
        }

        .new-game-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 12px 0 #3730a3, 0 20px 35px var(--bubble-glow);
        }

        .new-game-btn:active {
            transform: translateY(6px) scale(0.95);
            box-shadow: 0 2px 0 #3730a3;
        }

        .tagline {
            font-size: 14px;
            font-weight: bold;
            color: #ec4899;
            font-style: italic;
            opacity: 0.8;
            text-shadow: 0 0 10px var(--bubble-glow);
        }

        /* SLIDE PANEL */
        .slide-panel {
            position: fixed;
            bottom: -100%;
            left: 90px;
            right: 0;
            background: var(--card-bg);
            border-top: 8px solid var(--text-main);
            padding: 40px;
            height: 350px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1);
            z-index: 100;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.2);
            color: var(--text-sub);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .slide-panel.open { bottom: 0; }

        .play-btn {
            background: var(--juicy-gradient);
            color: white;
            padding: 20px 50px;
            border-radius: 60px;
            border: none;
            font-size: 28px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 0 #3730a3, 0 15px 30px rgba(236, 72, 153, 0.4);
            transition: 0.1s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .play-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #3730a3; }

        /* LOGOUT BUTTON */
        .logout-btn {
            background: var(--card-bg);
            color: #ef4444;
            border: 3px solid #fee2e2;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            box-shadow: 0 4px 10px var(--shadow);
            margin-top: 20px;
        }

        .logout-btn:hover { background: #ef4444; color: white; border-color: #ef4444; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ec4899; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="BubbleGames-logo.png" alt="Bubble Games" class="hub-logo">
    </div>

    <div class="sidebar">
        <div id="nav-home" class="side-icon active" onclick="switchTab('home')">🏠</div>
        <div id="nav-create" class="side-icon" onclick="switchTab('create')">🧱</div>
        <div id="nav-settings" class="side-icon" onclick="switchTab('settings')">⚙️</div>
    </div>

    <div id="view-home" class="main-content">
        <div style="text-align: center;">
            <h2 id="welcome-text">Discover Games</h2>
            <div style="position: relative; display: inline-block; width: 100%; max-width: 800px;">
                <span style="position: absolute; left: 25px; top: 22px; font-size: 30px;">🔍</span>
                <input type="text" class="hero-search" placeholder="Search all bubble games...">
            </div>
        </div>
        <div class="game-grid" id="global-game-grid"></div>
    </div>

    <div id="view-create" class="main-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Your Creations</h2>
            <div class="new-game-container">
                <button class="new-game-btn">+ New Game</button>
                <span class="tagline">Let your imagination flow with the Bubbles! ✨</span>
            </div>
        </div>
        <div class="game-grid" id="owned-game-grid"></div>
    </div>

    <div id="view-settings" class="main-content" style="display: none;">
        <h2>Settings</h2>
        <div style="background: var(--card-bg); padding: 30px; border-radius: 30px; border: 5px solid var(--border-color); max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <span><strong>Dark Mode</strong></span>
                <label class="switch">
                    <input type="checkbox" id="darkToggle" onclick="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="logout-btn" onclick="handleLogout()">
                <span>🚪</span> Log Out
            </button>
        </div>
    </div>

    <div id="actionPanel" class="slide-panel">
        <div class="panel-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; gap: 20px; align-items: center;">
                    <span id="panelIcon" style="font-size: 60px;">🎮</span>
                    <h2 id="panelTitle" style="margin: 0;">Game Title</h2>
                </div>
                <button onclick="closePanel()" style="cursor:pointer; background:none; border:none; font-size:32px; color: var(--text-sub);">✕</button>
            </div>
            <p id="panelDesc">Game description goes here...</p>
            <div style="display: flex; justify-content: flex-end;">
                 <button class="play-btn">Play Now</button>
            </div>
        </div>
    </div>

    <script type="module" src="static/hub.js"></script>
</body>
</html>
