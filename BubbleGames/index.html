<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Welcome</title>

    <script>
        // FORCED RESET: Clears the "ghosts" once and then marks it as clean
        if (!localStorage.getItem('ghosts_cleared_v2')) {
            localStorage.clear();
            sessionStorage.clear();
            localStorage.setItem('ghosts_cleared_v2', 'true');
            window.location.reload(); 
        }
    </script>

    <link rel="stylesheet" href="static/style.css">
    <style>
        /* Making the images much bigger as requested */
        .brand-img-main {
            height: 400px; /* Doubled size for the main card logo */
            width: auto;
            display: block;
            margin: 0 auto 15px auto; /* Added a little space at the bottom */
        }
        .brand-img-corner {
            height: 55px; /* Increased from 30px to 55px for the corner */
            width: auto;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="corner-brand">
        <!-- Replace top-left text with Logo -->
        <img src="BubbleGames-logo.png" alt="🫧 BubbleGames" class="brand-img-corner" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'">
        <span style="display:none;">🫧 Bubble<span class="brand-pink">Games</span></span>
    </div>

    <div id="user-status" class="user-status" style="display: none;">
        <span id="display-username">Player</span>
        <button class="logout-btn" onclick="handleLogout()">Logout ⏻</button>
    </div>

    <div class="main-wrapper">
        <h2 class="page-welcome" id="page-title">Getting Started</h2>

        <div class="bubble-card">
            <div class="brand">
                <!-- Replace middle logo text with Logo -->
                <img src="BubbleGames-logo.png" id="main-logo" alt="Bubble Games" class="brand-img-main" onerror="this.outerHTML='<span class=\'bubble-icon\'>🫧</span><h1>Bubble<span>Games</span></h1>'">
            </div>

            <div id="auth-area">
                <div class="input-area">
                    <input type="text" id="username" placeholder="Username" class="bouncy-input">

                    <div class="password-group">
                        <input type="password" id="password" placeholder="Password" class="bouncy-input">

                        <a href="#" class="forgot-link" id="forgot-pass">
                            Forgot Password?
                        </a>
                    </div>
                </div>

                <div id="loader" class="loader"></div>

                <button class="go-btn" id="main-button" onclick="handleAuth()">
                    🫧 Let's Play! 🫧
                </button>

                <div class="footer-links">
                    <p id="toggle-container">
                        New here?
                        <a href="#" class="signup-link" onclick="switchMode()">
                            Sign Up!
                        </a>
                    </p>
                </div>
            </div>

            <div id="hub-area" style="display: none;">

                <input
                    type="text"
                    id="game-search"
                    placeholder="What would you like to play? 🔍"
                    class="bouncy-input"
                >

                <div class="tab-menu">
                    <button
                        id="tab-global"
                        class="tab-btn active"
                        onclick="switchTab('global')"
                    >
                        Global Games
                    </button>

                    <button
                        id="tab-mine"
                        class="tab-btn"
                        onclick="switchTab('mine')"
                    >
                        My Games
                    </button>
                </div>

                <div id="game-list"></div>

            </div>
        </div>
    </div>

    <script type="module" src="static/gateway.js"></script>
    <script type="module" src="static/hub.js"></script>
    <script src="static/bubbles.js"></script>

</body>
</html>
