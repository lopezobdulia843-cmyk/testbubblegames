<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | World</title>
    <!-- Use your local CSS file name here -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <!-- 1. THE FLOATING BRAND (ALWAYS VISIBLE) -->
    <div class="corner-brand">
        <span class="brand-bubble">🫧</span> 
        Bubble<span class="brand-pink">Games</span>
    </div>

    <!-- 2. LOGIN / SIGNUP VIEW -->
    <div id="gateway-section" class="gateway-layout">
        <h2 class="page-welcome" id="page-title">Getting Started</h2>
        
        <div class="bubble-card">
            <div class="brand">
                <span class="bubble-icon">🫧</span>
                <h1>Bubble<span>Games</span></h1>
            </div>

            <div id="auth-area">
                <div class="input-area">
                    <input type="text" id="username" placeholder="Username" class="bouncy-input">
                    <div class="password-group">
                        <input type="password" id="password" placeholder="Password" class="bouncy-input">
                        <a href="#" class="forgot-link" id="forgot-pass">Forgot Password?</a>
                    </div>
                </div>
                <div id="loader" class="loader" style="display:none;"></div>
                <button class="go-btn" id="main-button" onclick="handleAuth()">Let's Play!</button>
                <div class="footer-links">
                    <p id="toggle-container">New here? <a href="#" class="signup-link" onclick="switchMode()">Sign Up!</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. THE HUB / DASHBOARD VIEW (HIDDEN UNTIL LOGIN) -->
    <div id="hub-section" style="display: none; width: 100%; height: 100vh;">
        
        <div class="sidebar">
            <div id="nav-home" class="side-icon active" onclick="switchTab('home')">🏠</div>
            <div id="nav-create" class="side-icon" onclick="switchTab('create')">🧱</div>
            <div id="nav-settings" class="side-icon" onclick="switchTab('settings')">⚙️</div>
        </div>

        <div id="view-home" class="main-content">
            <div class="hub-header">
                <h2>Discover Games</h2>
                <div class="search-container">
                    <span class="search-emoji">🔍</span>
                    <input type="text" id="game-search" class="hero-search" placeholder="Search all bubble games...">
                </div>
            </div>
            <div id="global-game-grid" class="game-grid">
                <!-- Market Cards here -->
            </div>
        </div>

        <div id="view-create" class="main-content" style="display: none;">
            <div class="creation-header">
                <h2>Your Creations</h2>
                <button class="new-game-btn">+ New Game</button>
            </div>
            <div id="my-game-grid" class="game-grid">
                <!-- Your Owned Cards here -->
            </div>
        </div>

        <div id="view-settings" class="main-content" style="display: none;">
            <h2>Settings</h2>
            <div class="settings-card-wrapper bubble-card" style="max-width: 400px; padding: 20px;">
                <div class="toggle-row">
                    <span><strong>Dark Mode</strong></span>
                    <label class="switch">
                        <input type="checkbox" id="darkToggle" onclick="toggleDarkMode()">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="logout-btn" onclick="handleLogout()" style="margin-top: 20px;">Log Out 🚪</button>
            </div>
        </div>
    </div>

    <!-- 4. SLIDE PANEL -->
    <div id="actionPanel" class="slide-panel">
        <div class="panel-header-row">
            <div class="panel-identity">
                <span id="panelIcon">🎮</span>
                <h2 id="panelTitle">Game Title</h2>
            </div>
            <button class="close-btn" onclick="closePanel()">Close</button>
        </div>
        <div id="panelContent">
            <button class="play-btn">Play Now</button>
        </div>
    </div>

    <!-- UI Scripts -->
    <script>
        window.mode = "login"; 
        
        function switchMode() {
            const btn = document.getElementById('main-button');
            const pageTitle = document.getElementById('page-title');
            if (window.mode === "login") {
                btn.innerText = "Create Account!";
                pageTitle.innerText = "Join the Community";
                window.mode = "signup";
            } else {
                btn.innerText = "Let's Play!";
                pageTitle.innerText = "Getting Started";
                window.mode = "login";
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.main-content').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.side-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('view-' + tabName).style.display = 'block';
            document.getElementById('nav-' + tabName).classList.add('active');
        }

        function unlockHub(username) {
            document.getElementById('gateway-section').style.display = 'none';
            document.getElementById('hub-section').style.display = 'flex';
        }
    </script>

    <!-- Logic Scripts (Assuming root folder) -->
    <script type="module" src="gateway.js"></script>
    <script type="module" src="hub.js"></script>
    <script src="bubbles.js"></script>
</body>
</html>
