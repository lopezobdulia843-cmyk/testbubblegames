<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Welcome</title>

    <script>
        if (!localStorage.getItem('ghosts_cleared_v2')) {
            localStorage.clear();
            sessionStorage.clear();
            localStorage.setItem('ghosts_cleared_v2', 'true');
            window.location.reload(); 
        }
    </script>

    <link rel="stylesheet" href="static/style.css">
    <style>
        /* RESPONSIVE LOGO (main) */
        .brand-img-main {
            display: block;
            margin: -10px auto 0 auto;
            width: min(280px, 70vw);
            height: auto;
            object-fit: contain;
        }

        /* RESPONSIVE CORNER LOGO */
        .brand-img-corner {
            display: block;
            width: clamp(120px, 18vw, 220px);
            height: auto;
            object-fit: contain;
        }

        .corner-brand {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
            padding: 0 !important;
        }

        .brand {
            margin: 0 !important;
            padding: 5px 0 !important;
            line-height: 0;
            overflow: visible;
        }

        /* SMALL "FOREHEAD" + RESPONSIVE BOX */
        .bubble-card {
            padding-top: clamp(12px, 2vh, 20px) !important;
            padding-left: 15px;
            padding-right: 15px;
            width: min(380px, 92vw);
        }

        /* RESPONSIVE TEXT INPUT AREA */
        .input-area, .password-group {
            width: 100%;
        }

        .bouncy-input {
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="corner-brand">
        <img src="BubbleGames-logo.png" alt="BubbleGames" class="brand-img-corner"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'">
        <span style="display:none;">🫧 Bubble<span class="brand-pink">Games</span></span>
    </div>

    <div id="user-status" class="user-status" style="display: none;">
        <span id="display-username">Player</span>
        <button class="logout-btn" onclick="handleLogout()">Logout ⏻</button>
    </div>

    <div class="main-wrapper">
        <h2 class="page-welcome" id="page-title">Getting Started</h2>

        <div class="bubble-card">
            <div class="brand">
                <img src="BubbleGames-logo.png" alt="Bubble Games" class="brand-img-main"
                     onerror="this.outerHTML='<span class=\'bubble-icon\'>🫧</span><h1>Bubble<span>Games</span></h1>'">
            </div>

            <div id="auth-area">
                <div class="input-area">
                    <input type="text" id="username" placeholder="Username" class="bouncy-input">

                    <div class="password-group">
                        <input type="password" id="password" placeholder="Password" class="bouncy-input">
                        <a href="#" class="forgot-link" id="forgot-pass">Forgot Password?</a>
                    </div>
                </div>

                <div id="loader" class="loader"></div>

                <button class="go-btn" id="main-button" onclick="handleAuth()">
                    🫧 Let's Play! 🫧
                </button>

                <div class="footer-links">
                    <p id="toggle-container">
                        New here?
                        <a href="#" class="signup-link" onclick="switchMode()">Sign Up!</a>
                    </p>
                </div>
            </div>

            <div id="hub-area" style="display: none;">
                <input
                    type="text"
                    id="game-search"
                    placeholder="What would you like to play? 🔍"
                    class="bouncy-input"
                >

                <div class="tab-menu">
                    <button id="tab-global" class="tab-btn active" onclick="switchTab('global')">
                        Global Games
                    </button>

                    <button id="tab-mine" class="tab-btn" onclick="switchTab('mine')">
                        My Games
                    </button>
                </div>

                <div id="game-list"></div>
            </div>
        </div>
    </div>

    <script type="module" src="static/gateway.js"></script>
    <script type="module" src="static/hub.js"></script>
    <script src="static/bubbles.js"></script>

</body>
</html>
